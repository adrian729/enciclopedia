<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Enciclopedia</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Enciclopedia - Personal Knowledge Base">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.min.css" />
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'Enciclopedia',
      loadSidebar: true,
      auto2top: true,
      subMaxLevel: 0,
      sidebarDisplayLevel: 1,
      plugins: [
        function fixHeadingIds(hook) {
          function scrollToId(id) {
            if (!id) return;
            var el = document.getElementById(id);
            if (el) el.scrollIntoView(true);
          }

          function getIdFromHash() {
            var m = location.hash.match(/[?&]id=([^&]+)/);
            return m ? decodeURIComponent(m[1]) : null;
          }

          // Strip _ prefix docsify adds to numeric-starting IDs
          hook.afterEach(function(html) {
            return html.replace(/ id="_(\d)/g, ' id="$1');
          });

          hook.doneEach(function() {
            // Fix sidebar auto-generated links
            document.querySelectorAll('.sidebar-nav a').forEach(function(a) {
              var href = a.getAttribute('href');
              if (href) a.setAttribute('href', href.replace(/#_(\d)/, '#$1').replace(/([?&]id=)_(\d)/g, '$1$2'));
            });
            // Scroll on page load / cross-page navigation
            scrollToId(getIdFromHash());
          });

          // querySelector('#1-xxx') is invalid CSS — docsify's scroll fails for
          // numeric-starting IDs. Catch clicks and use getElementById instead.
          hook.mounted(function() {
            document.addEventListener('click', function(e) {
              var a = e.target.closest('a[href]');
              if (!a) return;
              var href = a.getAttribute('href') || '';
              var m = href.match(/(?:#|[?&]id=)(\d[^&?]*)/);
              if (m) setTimeout(function() { scrollToId(m[1]); }, 10);
            });
          });
        }
      ]
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
</body>
</html>
